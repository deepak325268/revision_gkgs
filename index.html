<!DOCTYPE html>
<html lang="hi">
<head>
  <link rel="manifest" href="/revision_gkgs/manifest.json">
<link rel="apple-touch-icon" href="/revision_gkgs/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Revision">
  <title>आज का Revision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --card: #ffffff;
      --border: #e8e8e2;
      --text: #1a1a1a;
      --muted: #888;
      --accent-b: #1a56db;
      --accent-g: #0e9f6e;
      --accent-o: #d97706;
      --pill-b: #ebf5ff;
      --pill-g: #e8faf4;
      --pill-o: #fef3c7;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111112;
        --card: #1c1c1e;
        --border: #2c2c2e;
        --text: #f2f2f7;
        --muted: #666;
        --accent-b: #4a9eff;
        --accent-g: #30d158;
        --accent-o: #fbbf24;
        --pill-b: #1a2a3a;
        --pill-g: #1a2e1a;
        --pill-o: #2e2010;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
      overflow-x: hidden;
    }

    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding-top: calc(var(--safe-top) + 12px);
      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
    }

    .header h1 {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .day-pill {
      background: var(--text);
      color: var(--bg);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
      margin-top: 2px;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }

    .header-date {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }

    .tabs {
      display: flex;
      border-top: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 11px 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans Devanagari', sans-serif;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.active-b { color: var(--accent-b); border-bottom-color: var(--accent-b); }
    .tab-btn.active-g { color: var(--accent-g); border-bottom-color: var(--accent-g); }
    .tab-btn.active-o { color: var(--accent-o); border-bottom-color: var(--accent-o); }

    .progress-wrap {
      padding: 8px 20px 12px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      width: 0%;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    .fill-b { background: var(--accent-b); }
    .fill-g { background: var(--accent-g); }
    .fill-o { background: var(--accent-o); }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      font-family: 'Inter', sans-serif;
    }

    .stale-bar {
      display: none;
      background: var(--pill-o);
      color: var(--accent-o);
      font-size: 11px;
      text-align: center;
      padding: 4px;
      font-family: 'Inter', sans-serif;
    }
    .stale-bar.show { display: block; }

    /* Swipe animation */
    .main {
      padding: 16px 16px 0;
      max-width: 520px;
      margin: 0 auto;
      overflow: hidden;
    }

    #content {
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), opacity 0.25s;
    }

    #content.slide-left {
      animation: slideInLeft 0.25s cubic-bezier(.4,0,.2,1) both;
    }

    #content.slide-right {
      animation: slideInRight 0.25s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes slideInLeft {
      from { transform: translateX(60px); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }

    @keyframes slideInRight {
      from { transform: translateX(-60px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .done-banner {
      display: none;
      text-align: center;
      padding: 18px;
      margin: 0 0 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .done-banner.show { display: block; }
    .done-banner h3 {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 16px;
      font-weight: 600;
    }
    .done-banner p { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'Noto Sans Devanagari', sans-serif; }

    .chapter-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .chapter-card:active { opacity: 0.7; }
    .chapter-card.done { opacity: 0.45; }

    .chapter-info { flex: 1; min-width: 0; }

    .chapter-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .chapter-card.done .chapter-name { text-decoration: line-through; color: var(--muted); }

    .cls-pill {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
    }
    .pill-b { background: var(--pill-b); color: var(--accent-b); }
    .pill-g { background: var(--pill-g); color: var(--accent-g); }
    .pill-o { background: var(--pill-o); color: var(--accent-o); }

    .sub-list { display: flex; flex-direction: column; gap: 6px; }

    .sub-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sub-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      min-width: 44px;
    }

    .sub-q {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent-o);
      font-family: 'Inter', sans-serif;
      background: var(--pill-o);
      padding: 2px 10px;
      border-radius: 6px;
    }

    .check-box {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      transition: all 0.2s;
      margin-top: 1px;
    }
    .check-b.checked { background: var(--accent-b); border-color: var(--accent-b); color: #fff; }
    .check-g.checked { background: var(--accent-g); border-color: var(--accent-g); color: #fff; }
    .check-o.checked { background: var(--accent-o); border-color: var(--accent-o); color: #fff; }

    .loading {
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px; gap: 14px; color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 2px solid var(--border);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spin-b { border-top-color: var(--accent-b); }
    .spin-g { border-top-color: var(--accent-g); }
    .spin-o { border-top-color: var(--accent-o); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { text-align: center; padding: 50px 20px; }
    .error-box p { font-size: 14px; color: var(--muted); margin-bottom: 16px; font-family: 'Noto Sans Devanagari', sans-serif; }
    .retry-btn {
      background: var(--text); color: var(--bg);
      border: none; padding: 10px 24px; border-radius: 10px;
      font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>आज का Revision</h1>
      <div class="header-date" id="dateText"></div>
    </div>
    <div class="day-pill" id="dayPill">...</div>
  </div>
  <div class="tabs">
    <button class="tab-btn" id="tab-b" onclick="switchTab('bhugol', null)">🗺 भूगोल</button>
    <button class="tab-btn" id="tab-g" onclick="switchTab('science', null)">🔬 विज्ञान</button>
    <button class="tab-btn" id="tab-o" onclick="switchTab('math', null)">📐 Math</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">Loading...</div>
</div>
<div class="stale-bar" id="staleBar">⟳ Updating data...</div>

<div class="main">
  <div class="done-banner" id="doneBanner">
    <h3>✅ सब complete हो गया!</h3>
    <p>आज का revision खत्म।</p>
  </div>
  <div id="content"></div>
</div>

<script>
const API_BS   = "https://script.google.com/macros/s/AKfycbx2e2C9JBilgw7B4ZdOdb5-MEtkcnPjEB18qYWRTIgkNohmhJc2VXcEMEqm8oyVprYk/exec";
const API_MATH = "https://script.google.com/macros/s/AKfycbxk49C7jQafjKBKqR4jPeFzAl2ltlUkd1WXkErL8ih4lXF_19q2eVcFRYr8zCf0OhQBww/exec";

const today    = new Date();
const dateStr  = today.toISOString().slice(0,10);
const doneKey  = "done_" + dateStr;
const cacheKey = "cache_" + dateStr;

let doneSet  = new Set(JSON.parse(localStorage.getItem(doneKey) || "[]"));
let allData  = { bhugol: null, science: null, math: null };
let dayNums  = { bs: null, math: null };

var savedTab = localStorage.getItem("activeTab") || "bhugol";
let activeTab = savedTab;

const TABS = ["bhugol", "science", "math"];

document.getElementById("dateText").textContent =
  today.toLocaleDateString("hi-IN", { weekday:"long", day:"numeric", month:"long" });

var cached = localStorage.getItem(cacheKey);
if (cached) {
  try {
    var c = JSON.parse(cached);
    if (c.bs) {
      dayNums.bs = c.bs.day;
      c.bs.subjects.forEach(function(sub) {
        if (sub.name === "भूगोल") allData.bhugol = { chapters: sub.chapters };
        else if (sub.name === "विज्ञान") allData.science = { chapters: sub.chapters };
      });
    }
    if (c.math) {
      dayNums.math = c.math.day;
      allData.math = c.math;
    }
  } catch(e) {}
}

function save() {
  localStorage.setItem(doneKey, JSON.stringify([...doneSet]));
  updateProgress();
}

function countTotal(tab) {
  var d = allData[tab];
  if (!d || !d.chapters) return 0;
  return d.chapters.length;
}

function countDone(tab) {
  var done = 0;
  doneSet.forEach(function(k) { if (k.startsWith(tab+"_")) done++; });
  return done;
}

function updateDayPill() {
  var day = activeTab === "math" ? dayNums.math : dayNums.bs;
  document.getElementById("dayPill").textContent = day ? "Day " + day : "...";
}

function updateProgress() {
  var total = countTotal(activeTab);
  var done  = countDone(activeTab);
  var pct   = total ? Math.round((done/total)*100) : 0;
  var fill  = document.getElementById("progressFill");
  fill.style.width = pct + "%";
  var clr = activeTab==="bhugol"?"b":activeTab==="science"?"g":"o";
  fill.className = "progress-fill fill-" + clr;
  document.getElementById("progressLabel").textContent = done + " / " + total + " complete";
  document.getElementById("doneBanner").classList.toggle("show", done===total && total>0);
}

// direction: 'left' = next tab aa raha, 'right' = prev tab aa raha, null = no animation
function switchTab(tab, direction) {
  activeTab = tab;
  localStorage.setItem("activeTab", tab);
  ["bhugol","science","math"].forEach(function(t) {
    var k = t==="bhugol"?"b":t==="science"?"g":"o";
    document.getElementById("tab-"+k).className = "tab-btn";
  });
  var key = tab==="bhugol"?"b":tab==="science"?"g":"o";
  document.getElementById("tab-"+key).className = "tab-btn active-" + key;
  updateDayPill();
  renderTab(direction);
}

function renderTab(direction) {
  var content = document.getElementById("content");
  var clr = activeTab==="bhugol"?"b":activeTab==="science"?"g":"o";

  // Remove old animation classes
  content.classList.remove("slide-left", "slide-right");

  if (!allData[activeTab]) {
    content.innerHTML = '<div class="loading"><div class="spinner spin-'+clr+'"></div><span>Loading...</span></div>';
    updateProgress();
    return;
  }

  content.innerHTML = "";
  var data = allData[activeTab];

  if (!data.chapters || data.chapters.length === 0) {
    content.innerHTML = '<div class="error-box"><p>कोई chapter नहीं मिला।</p></div>';
    return;
  }

  if (activeTab === "math") {
    data.chapters.forEach(function(ch, i) {
      content.appendChild(makeMathCard("math_"+i, ch));
    });
  } else {
    data.chapters.forEach(function(ch, i) {
      content.appendChild(makeBSCard(activeTab+"_"+i, ch, clr));
    });
  }

  // Apply animation
  if (direction === "left") {
    void content.offsetWidth; // reflow
    content.classList.add("slide-left");
  } else if (direction === "right") {
    void content.offsetWidth;
    content.classList.add("slide-right");
  }

  updateProgress();
}

function makeBSCard(key, ch, clr) {
  var done = doneSet.has(key);
  var card = document.createElement("div");
  card.className = "chapter-card" + (done?" done":"");
  card.innerHTML =
    '<div class="chapter-info">' +
      '<div class="chapter-name">' + ch.chapter + '</div>' +
      '<span class="cls-pill pill-'+clr+'">Class ' + ch.cls + '</span>' +
    '</div>' +
    '<div class="check-box check-'+clr+(done?" checked":"")+'">'+( done?"✓":"")+'</div>';
  card.addEventListener("click", function() { toggleDone(key, card, clr); });
  return card;
}

function makeMathCard(key, ch) {
  var done = doneSet.has(key);
  var card = document.createElement("div");
  card.className = "chapter-card" + (done?" done":"");
  var subsHtml = '<div class="sub-list">';
  ch.subs.forEach(function(s) {
    subsHtml += '<div class="sub-row"><span class="sub-label">Sub '+s.subNum+'</span><span class="sub-q">Q. '+s.q+'</span></div>';
  });
  subsHtml += '</div>';
  card.innerHTML =
    '<div class="chapter-info">' +
      '<div class="chapter-name">' + ch.chapter + '</div>' +
      subsHtml +
    '</div>' +
    '<div class="check-box check-o'+(done?" checked":"")+'">'+( done?"✓":"")+'</div>';
  card.addEventListener("click", function() { toggleDone(key, card, "o"); });
  return card;
}

function toggleDone(key, card, clr) {
  if (doneSet.has(key)) {
    doneSet.delete(key);
    card.classList.remove("done");
    card.querySelector(".check-box").className = "check-box check-"+clr;
    card.querySelector(".check-box").textContent = "";
  } else {
    doneSet.add(key);
    card.classList.add("done");
    card.querySelector(".check-box").className = "check-box check-"+clr+" checked";
    card.querySelector(".check-box").textContent = "✓";
  }
  save();
}

// Init
switchTab(activeTab, null);

// Swipe detection
var touchStartX = 0;
var touchStartY = 0;
document.addEventListener("touchstart", function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener("touchend", function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    var idx = TABS.indexOf(activeTab);
    if (dx < 0 && idx < TABS.length - 1) {
      // Left swipe → next tab, content aata hai left se
      switchTab(TABS[idx + 1], "left");
    } else if (dx > 0 && idx > 0) {
      // Right swipe → prev tab, content aata hai right se
      switchTab(TABS[idx - 1], "right");
    }
  }
}, { passive: true });

// Fetch data
var cacheObj = {};
var bsDone = false, mathDone = false;

function saveCache() {
  if (bsDone && mathDone) {
    localStorage.setItem(cacheKey, JSON.stringify(cacheObj));
    document.getElementById("staleBar").classList.remove("show");
  }
}

if (cached) {
  document.getElementById("staleBar").classList.add("show");
}

fetch(API_BS)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    cacheObj.bs = data;
    dayNums.bs = data.day;
    data.subjects.forEach(function(sub) {
      if (sub.name === "भूगोल") allData.bhugol = { chapters: sub.chapters };
      else if (sub.name === "विज्ञान") allData.science = { chapters: sub.chapters };
    });
    if (activeTab === "bhugol" || activeTab === "science") {
      updateDayPill();
      renderTab(null);
    }
    bsDone = true;
    saveCache();
  })
  .catch(function() {
    bsDone = true;
    saveCache();
    if (!allData.bhugol && (activeTab==="bhugol"||activeTab==="science")) {
      document.getElementById("content").innerHTML =
        '<div class="error-box"><p>Data load नहीं हुआ।</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>';
    }
  });

fetch(API_MATH)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    cacheObj.math = data;
    dayNums.math = data.day;
    allData.math = data;
    if (activeTab === "math") {
      updateDayPill();
      renderTab(null);
    }
    mathDone = true;
    saveCache();
  })
  .catch(function() {
    mathDone = true;
    saveCache();
    if (!allData.math && activeTab==="math") {
      document.getElementById("content").innerHTML =
        '<div class="error-box"><p>Math data load नहीं हुआ।</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>';
    }
  });
</script>
</body>
</html>
