<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Revision">
  <title>आज का Revision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --card: #ffffff;
      --border: #e8e8e2;
      --text: #1a1a1a;
      --muted: #888;
      --accent-b: #1a56db;
      --accent-g: #0e9f6e;
      --accent-o: #d97706;
      --pill-b: #ebf5ff;
      --pill-g: #e8faf4;
      --pill-o: #fef3c7;
      --radius: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111112;
        --card: #1c1c1e;
        --border: #2c2c2e;
        --text: #f2f2f7;
        --muted: #888;
        --accent-b: #4a9eff;
        --accent-g: #30d158;
        --accent-o: #fbbf24;
        --pill-b: #1a2a3a;
        --pill-g: #1a2e1a;
        --pill-o: #2e2010;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 52px 20px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
    }

    .header h1 {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .day-pill {
      background: var(--text);
      color: var(--bg);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
      margin-top: 3px;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }

    .header-date {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }

    /* Tab buttons */
    .tabs {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans Devanagari', sans-serif;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.active-b { color: var(--accent-b); border-bottom-color: var(--accent-b); }
    .tab-btn.active-g { color: var(--accent-g); border-bottom-color: var(--accent-g); }
    .tab-btn.active-o { color: var(--accent-o); border-bottom-color: var(--accent-o); }

    /* Progress */
    .progress-wrap {
      padding: 10px 20px 14px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      width: 0%;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    .fill-b { background: var(--accent-b); }
    .fill-g { background: var(--accent-g); }
    .fill-o { background: var(--accent-o); }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      font-family: 'Inter', sans-serif;
    }

    .main { padding: 20px 16px 0; max-width: 520px; margin: 0 auto; }

    /* Done banner */
    .done-banner {
      display: none;
      text-align: center;
      padding: 20px;
      margin: 0 0 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .done-banner.show { display: block; }
    .done-banner h3 {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 17px;
      font-weight: 600;
    }
    .done-banner p { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'Noto Sans Devanagari', sans-serif; }

    /* Chapter card */
    .chapter-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .chapter-card:active { opacity: 0.7; }
    .chapter-card.done { opacity: 0.5; }

    .chapter-info { flex: 1; min-width: 0; }

    .chapter-name {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .chapter-card.done .chapter-name { text-decoration: line-through; color: var(--muted); }

    .chapter-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
    }
    .pill-b { background: var(--pill-b); color: var(--accent-b); }
    .pill-g { background: var(--pill-g); color: var(--accent-g); }
    .pill-o { background: var(--pill-o); color: var(--accent-o); }

    .check-box {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      transition: all 0.2s;
    }
    .check-b.checked { background: var(--accent-b); border-color: var(--accent-b); color: #fff; }
    .check-g.checked { background: var(--accent-g); border-color: var(--accent-g); color: #fff; }
    .check-o.checked { background: var(--accent-o); border-color: var(--accent-o); color: #fff; }

    /* Loading */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      padding: 80px 20px; gap: 14px; color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spin-b { border-top-color: var(--accent-b); }
    .spin-g { border-top-color: var(--accent-g); }
    .spin-o { border-top-color: var(--accent-o); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { text-align: center; padding: 60px 20px; }
    .error-box p { font-size: 14px; color: var(--muted); margin-bottom: 20px; font-family: 'Noto Sans Devanagari', sans-serif; }
    .retry-btn {
      background: var(--text); color: var(--bg);
      border: none; padding: 10px 24px; border-radius: 10px;
      font-size: 14px; cursor: pointer;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>आज का Revision</h1>
      <div class="header-date" id="dateText"></div>
    </div>
    <div class="day-pill" id="dayPill">...</div>
  </div>
  <div class="tabs">
    <button class="tab-btn" id="tab-b" onclick="switchTab('bhugol')">🗺 भूगोल</button>
    <button class="tab-btn" id="tab-g" onclick="switchTab('science')">🔬 विज्ञान</button>
    <button class="tab-btn" id="tab-o" onclick="switchTab('math')">📐 Math</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">Loading...</div>
</div>

<div class="main">
  <div class="done-banner" id="doneBanner">
    <h3 id="doneTxt">✅ सब complete हो गया!</h3>
    <p>आज का revision खत्म।</p>
  </div>
  <div id="content"></div>
</div>

<script>
const API_BS = "https://script.google.com/macros/s/AKfycbx2e2C9JBilgw7B4ZdOdb5-MEtkcnPjEB18qYWRTIgkNohmhJc2VXcEMEqm8oyVprYk/exec";
const API_MATH = "https://script.google.com/macros/s/AKfycbxk49C7jQafjKBKqR4jPeFzAl2ltlUkd1WXkErL8ih4lXF_19q2eVcFRYr8zCf0OhQBww/exec";

const today   = new Date();
const dateStr = today.toISOString().slice(0,10);
const storeKey = "done_" + dateStr;
let doneSet   = new Set(JSON.parse(localStorage.getItem(storeKey) || "[]"));

let allData   = { bhugol: null, science: null, math: null };
let activeTab = "bhugol";

document.getElementById("dateText").textContent =
  today.toLocaleDateString("hi-IN", { weekday:"long", day:"numeric", month:"long" });

function save() {
  localStorage.setItem(storeKey, JSON.stringify([...doneSet]));
  updateProgress();
}

function countTotal(tab) {
  if (tab === "math") {
    if (!allData.math) return 0;
    return allData.math.chapters.length;
  }
  const subj = allData[tab];
  if (!subj) return 0;
  return subj.chapters ? subj.chapters.length : 0;
}

function countDone(tab) {
  let done = 0;
  doneSet.forEach(k => { if (k.startsWith(tab + "_")) done++; });
  return done;
}

function updateProgress() {
  const total = countTotal(activeTab);
  const done  = countDone(activeTab);
  const pct   = total ? Math.round((done/total)*100) : 0;
  const fill  = document.getElementById("progressFill");
  fill.style.width = pct + "%";
  fill.className = "progress-fill fill-" + (activeTab==="bhugol"?"b":activeTab==="science"?"g":"o");
  document.getElementById("progressLabel").textContent = done + " / " + total + " complete";
  const allDone = done === total && total > 0;
  document.getElementById("doneBanner").classList.toggle("show", allDone);
}

function switchTab(tab) {
  activeTab = tab;
  ["bhugol","science","math"].forEach(t => {
    const btn = document.getElementById("tab-" + (t==="bhugol"?"b":t==="science"?"g":"o"));
    btn.className = "tab-btn";
  });
  const key = tab==="bhugol"?"b":tab==="science"?"g":"o";
  document.getElementById("tab-"+key).className = "tab-btn active-" + key;
  renderTab();
}

function renderTab() {
  const content = document.getElementById("content");
  const spinCol = activeTab==="bhugol"?"spin-b":activeTab==="science"?"spin-g":"spin-o";

  if (!allData[activeTab]) {
    content.innerHTML = '<div class="loading"><div class="spinner ' + spinCol + '"></div><span>Loading...</span></div>';
    updateProgress();
    return;
  }

  content.innerHTML = "";

  if (activeTab === "math") {
    renderMath(content);
  } else {
    renderBhuSci(content);
  }
  updateProgress();
}

function renderBhuSci(content) {
  const subj = allData[activeTab];
  if (!subj || !subj.chapters || subj.chapters.length === 0) {
    content.innerHTML = '<div class="error-box"><p>कोई chapter नहीं मिला।</p></div>';
    return;
  }
  const clr = activeTab === "bhugol" ? "b" : "g";
  subj.chapters.forEach(function(ch, i) {
    content.appendChild(makeCard(activeTab + "_" + i, ch.chapter, "Class " + ch.cls, clr));
  });
}

function renderMath(content) {
  const data = allData.math;
  if (!data || !data.chapters || data.chapters.length === 0) {
    content.innerHTML = '<div class="error-box"><p>कोई chapter नहीं मिला।</p></div>';
    return;
  }
  data.chapters.forEach(function(ch, i) {
    const meta = ch.subs.map(function(s) { return "Sub " + s.subNum + ": Q." + s.q; }).join("  •  ");
    content.appendChild(makeCard("math_" + i, ch.chapter, meta, "o"));
  });
}

function makeCard(key, title, subtitle, clr) {
  const done = doneSet.has(key);
  const card = document.createElement("div");
  card.className = "chapter-card" + (done ? " done" : "");

  const pillClass = "pill pill-" + clr;
  const checkClass = "check-box check-" + clr + (done ? " checked" : "");

  card.innerHTML =
    '<div class="chapter-info">' +
      '<div class="chapter-name">' + title + '</div>' +
      '<div class="chapter-meta">' +
        '<span class="' + pillClass + '">' + subtitle + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="' + checkClass + '">' + (done ? "✓" : "") + '</div>';

  card.addEventListener("click", function() {
    if (doneSet.has(key)) {
      doneSet.delete(key);
      card.classList.remove("done");
      card.querySelector(".check-box").className = "check-box check-" + clr;
      card.querySelector(".check-box").textContent = "";
    } else {
      doneSet.add(key);
      card.classList.add("done");
      card.querySelector(".check-box").className = "check-box check-" + clr + " checked";
      card.querySelector(".check-box").textContent = "✓";
    }
    save();
  });
  return card;
}

// Load Bhugol+Science
fetch(API_BS)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    document.getElementById("dayPill").textContent = "Day " + data.day;
    // Split subjects
    data.subjects.forEach(function(sub) {
      if (sub.name === "भूगोल") {
        allData.bhugol = { chapters: sub.chapters };
      } else if (sub.name === "विज्ञान") {
        allData.science = { chapters: sub.chapters };
      }
    });
    if (activeTab === "bhugol" || activeTab === "science") renderTab();
  })
  .catch(function() {
    if (activeTab === "bhugol" || activeTab === "science") {
      document.getElementById("content").innerHTML =
        '<div class="error-box"><p>Data load नहीं हुआ।</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>';
    }
  });

// Load Math
fetch(API_MATH)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    allData.math = data;
    if (activeTab === "math") renderTab();
  })
  .catch(function() {
    if (activeTab === "math") {
      document.getElementById("content").innerHTML =
        '<div class="error-box"><p>Math data load नहीं हुआ।</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>';
    }
  });

// Init
switchTab("bhugol");
</script>
</body>
</html>
