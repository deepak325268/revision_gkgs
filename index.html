<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Revision">
  <title>आज का Revision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --card: #ffffff;
      --border: #e8e8e2;
      --text: #1a1a1a;
      --muted: #888;
      --accent-b: #1a56db;
      --accent-g: #0e9f6e;
      --pill-b: #ebf5ff;
      --pill-g: #e8faf4;
      --done-line: #bbb;
      --radius: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111112;
        --card: #1c1c1e;
        --border: #2c2c2e;
        --text: #f2f2f7;
        --muted: #888;
        --accent-b: #4a9eff;
        --accent-g: #30d158;
        --pill-b: #1a2a3a;
        --pill-g: #1a2e1a;
        --done-line: #555;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* Header */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 52px 20px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .header h1 {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .day-pill {
      background: var(--text);
      color: var(--bg);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
      margin-top: 3px;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }

    .header-date {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }

    /* Progress */
    .progress-wrap {
      margin-top: 14px;
    }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-g);
      border-radius: 10px;
      width: 0%;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      font-family: 'Inter', sans-serif;
    }

    /* Main */
    .main { padding: 20px 16px 0; max-width: 520px; margin: 0 auto; }

    /* Subject block */
    .subject-block { margin-bottom: 28px; }

    .subject-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .subject-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-blue { background: var(--accent-b); }
    .dot-green { background: var(--accent-g); }

    .subject-name {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-size: 12px;
    }

    .subject-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
    }

    /* Chapter card */
    .chapter-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .chapter-card:active { opacity: 0.7; }

    .chapter-card.done { opacity: 0.5; }

    .chapter-info { flex: 1; min-width: 0; }

    .chapter-name {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }

    .chapter-card.done .chapter-name {
      text-decoration: line-through;
      color: var(--muted);
    }

    .chapter-cls {
      display: inline-block;
      margin-top: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
    }

    .cls-blue { background: var(--pill-b); color: var(--accent-b); }
    .cls-green { background: var(--pill-g); color: var(--accent-g); }

    .check-box {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 12px;
    }

    .chapter-card.done .check-box {
      background: var(--accent-g);
      border-color: var(--accent-g);
      color: #fff;
    }

    /* Done banner */
    .done-banner {
      display: none;
      text-align: center;
      padding: 20px;
      margin: 0 0 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .done-banner.show { display: block; }

    .done-banner .emoji { font-size: 28px; margin-bottom: 6px; }

    .done-banner h3 {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--accent-g);
    }

    .done-banner p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-b);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      text-align: center;
      padding: 60px 20px;
    }

    .error-box h2 { font-size: 17px; color: var(--text); margin-bottom: 8px; }
    .error-box p { font-size: 14px; color: var(--muted); margin-bottom: 20px; font-family: 'Noto Sans Devanagari', sans-serif; }

    .retry-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>आज का Revision</h1>
      <div class="header-date" id="dateText"></div>
    </div>
    <div class="day-pill" id="dayPill">...</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel"></div>
  </div>
</div>

<div class="main">
  <div class="done-banner" id="doneBanner">
    <div class="emoji">✅</div>
    <h3>सब complete हो गया!</h3>
    <p>आज का revision खत्म।</p>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <span>Chapters load हो रहे हैं...</span>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx2e2C9JBilgw7B4ZdOdb5-MEtkcnPjEB18qYWRTIgkNohmhJc2VXcEMEqm8oyVprYk/exec";

const COLORS = {
  "भूगोल":   { dot: "dot-blue",  cls: "cls-blue"  },
  "विज्ञान": { dot: "dot-green", cls: "cls-green" },
};

const today    = new Date();
const dateStr  = today.toISOString().slice(0, 10);
const storeKey = "done_" + dateStr;
let doneSet    = new Set(JSON.parse(localStorage.getItem(storeKey) || "[]"));
let totalCh    = 0;

document.getElementById("dateText").textContent =
  today.toLocaleDateString("hi-IN", { weekday: "long", day: "numeric", month: "long" });

function save() {
  localStorage.setItem(storeKey, JSON.stringify([...doneSet]));
  updateProgress();
}

function updateProgress() {
  const done = doneSet.size;
  const pct  = totalCh ? Math.round((done / totalCh) * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = done + " / " + totalCh + " complete";
  document.getElementById("doneBanner").classList.toggle("show", done === totalCh && totalCh > 0);
}

function makeCard(ch, idx, subjectName, clsColor) {
  const key  = subjectName + "_" + idx;
  const done = doneSet.has(key);
  const card = document.createElement("div");
  card.className = "chapter-card" + (done ? " done" : "");
  card.innerHTML =
    '<div class="chapter-info">' +
      '<div class="chapter-name">' + ch.chapter + '</div>' +
      '<span class="chapter-cls ' + clsColor + '">Class ' + ch.cls + '</span>' +
    '</div>' +
    '<div class="check-box">' + (done ? "✓" : "") + '</div>';

  card.addEventListener("click", function() {
    if (doneSet.has(key)) {
      doneSet.delete(key);
      card.classList.remove("done");
      card.querySelector(".check-box").textContent = "";
    } else {
      doneSet.add(key);
      card.classList.add("done");
      card.querySelector(".check-box").textContent = "✓";
    }
    save();
  });
  return card;
}

function render(data) {
  document.getElementById("dayPill").textContent = "Day " + data.day;
  totalCh = data.subjects.reduce(function(s, sub) { return s + sub.chapters.length; }, 0);

  const content = document.getElementById("content");
  content.innerHTML = "";

  data.subjects.forEach(function(sub) {
    if (!sub.chapters.length) return;
    const colors = COLORS[sub.name] || { dot: "dot-blue", cls: "cls-blue" };

    const block = document.createElement("div");
    block.className = "subject-block";

    const label = document.createElement("div");
    label.className = "subject-label";
    label.innerHTML =
      '<div class="subject-dot ' + colors.dot + '"></div>' +
      '<div class="subject-name">' + sub.name + '</div>' +
      '<div class="subject-count">' + sub.chapters.length + ' chapters</div>';
    block.appendChild(label);

    sub.chapters.forEach(function(ch, i) {
      block.appendChild(makeCard(ch, i, sub.name, colors.cls));
    });

    content.appendChild(block);
  });

  updateProgress();
}

fetch(API)
  .then(function(r) { return r.json(); })
  .then(function(data) { render(data); })
  .catch(function() {
    document.getElementById("content").innerHTML =
      '<div class="error-box">' +
        '<h2>Data load नहीं हुआ</h2>' +
        '<p>Internet check करो और dobara try करो।</p>' +
        '<button class="retry-btn" onclick="location.reload()">Retry</button>' +
      '</div>';
  });
</script>
</body>
</html>
