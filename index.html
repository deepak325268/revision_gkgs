<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Revision">
  <title>आज का Revision</title>
  <link rel="manifest" href="#" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card2: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --muted: #888;
      --bhugol: #f5a623;
      --science: #4ecdc4;
      --border: rgba(255,255,255,0.07);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans Devanagari', sans-serif;
      min-height: 100vh;
      padding: 0 0 40px 0;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 48px 20px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(233,69,96,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(78,205,196,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .day-badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: white;
      position: relative;
      z-index: 1;
    }

    .header p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      font-family: 'Space Mono', monospace;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { color: var(--muted); font-size: 14px; }

    /* Content */
    .content { padding: 24px 16px; max-width: 480px; margin: 0 auto; }

    /* Subject Section */
    .subject-section {
      margin-bottom: 28px;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
      transform: translateY(16px);
    }

    .subject-section:nth-child(2) { animation-delay: 0.1s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .subject-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .subject-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .bhugol-dot { background: var(--bhugol); box-shadow: 0 0 8px var(--bhugol); }
    .science-dot { background: var(--science); box-shadow: 0 0 8px var(--science); }

    .subject-name {
      font-size: 18px;
      font-weight: 700;
      color: white;
    }

    .subject-count {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 10px;
      border-radius: 10px;
    }

    /* Chapter Card */
    .chapter-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform 0.15s, border-color 0.15s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .chapter-card:active { transform: scale(0.98); }

    .chapter-card.done {
      opacity: 0.45;
    }

    .chapter-card.done .chapter-name {
      text-decoration: line-through;
    }

    .chapter-num {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      min-width: 22px;
      text-align: center;
    }

    .chapter-info { flex: 1; }

    .chapter-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .chapter-class {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Space Mono', monospace;
    }

    .check-icon {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 12px;
    }

    .chapter-card.done .check-icon {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Progress Bar */
    .progress-bar {
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      height: 4px;
      margin: 16px 16px 0;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff6b9d);
      border-radius: 20px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-text {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Error */
    .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .error h2 { color: var(--accent); margin-bottom: 8px; }

    /* Refresh btn */
    .refresh-btn {
      display: block;
      margin: 20px auto 0;
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }

    /* Completion banner */
    .done-banner {
      display: none;
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #1a3a1a, #0f2e0f);
      border: 1px solid rgba(78,205,100,0.2);
      border-radius: 16px;
      margin: 0 16px 20px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .done-banner.show { display: block; }
    .done-banner h3 { color: #4ecd64; font-size: 18px; }
    .done-banner p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  </style>
</head>
<body>

<div class="header">
  <div class="day-badge" id="dayBadge">Loading...</div>
  <h1>📚 आज का Revision</h1>
  <p id="dateText"></p>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>
<div class="progress-text" id="progressText"></div>

<div class="done-banner" id="doneBanner">
  <h3>✅ सब हो गया!</h3>
  <p>आज का revision complete!</p>
</div>

<div id="main">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading chapters...</p>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx2e2C9JBilgw7B4ZdOdb5-MEtkcnPjEB18qYWRTIgkNohmhJc2VXcEMEqm8oyVprYk/exec";

  const SUBJECT_COLORS = {
    "भूगोल":  { dot: "bhugol-dot",  color: "#f5a623" },
    "विज्ञान": { dot: "science-dot", color: "#4ecdc4" },
  };

  // Date display
  const today = new Date();
  document.getElementById("dateText").textContent =
    today.toLocaleDateString("hi-IN", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

  // Load done state from localStorage
  const storageKey = "revision_done_" + today.toISOString().slice(0, 10);
  let doneSet = new Set(JSON.parse(localStorage.getItem(storageKey) || "[]"));

  let totalChapters = 0;

  function saveDone() {
    localStorage.setItem(storageKey, JSON.stringify([...doneSet]));
    updateProgress();
  }

  function updateProgress() {
    const done = doneSet.size;
    const pct  = totalChapters ? Math.round((done / totalChapters) * 100) : 0;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressText").textContent = `${done} / ${totalChapters} complete`;
    document.getElementById("doneBanner").classList.toggle("show", done === totalChapters && totalChapters > 0);
  }

  function renderChapter(ch, idx, subjectName) {
    const key  = subjectName + "_" + idx;
    const done = doneSet.has(key);
    const card = document.createElement("div");
    card.className = "chapter-card" + (done ? " done" : "");
    card.innerHTML = `
      <div class="chapter-num">${idx + 1}</div>
      <div class="chapter-info">
        <div class="chapter-name">${ch.chapter}</div>
        <div class="chapter-class">Class ${ch.cls}</div>
      </div>
      <div class="check-icon">${done ? "✓" : ""}</div>
    `;
    card.addEventListener("click", () => {
      if (doneSet.has(key)) {
        doneSet.delete(key);
        card.classList.remove("done");
        card.querySelector(".check-icon").textContent = "";
      } else {
        doneSet.add(key);
        card.classList.add("done");
        card.querySelector(".check-icon").textContent = "✓";
      }
      saveDone();
    });
    return card;
  }

  function render(data) {
    document.getElementById("dayBadge").textContent = "Day " + data.day;

    totalChapters = data.subjects.reduce((sum, s) => sum + s.chapters.length, 0);

    const main = document.getElementById("main");
    main.innerHTML = "";

    const content = document.createElement("div");
    content.className = "content";

    data.subjects.forEach((subject, si) => {
      if (!subject.chapters.length) return;

      const colors = SUBJECT_COLORS[subject.name] || { dot: "bhugol-dot" };
      const section = document.createElement("div");
      section.className = "subject-section";

      const header = document.createElement("div");
      header.className = "subject-header";
      header.innerHTML = `
        <div class="subject-dot ${colors.dot}"></div>
        <div class="subject-name">${subject.name}</div>
        <div class="subject-count">${subject.chapters.length} chapters</div>
      `;
      section.appendChild(header);

      subject.chapters.forEach((ch, i) => {
        section.appendChild(renderChapter(ch, i, subject.name));
      });

      content.appendChild(section);
    });

    main.appendChild(content);
    updateProgress();
  }

  // Fetch data
  fetch(API_URL)
    .then(r => r.json())
    .then(data => render(data))
    .catch(err => {
      document.getElementById("main").innerHTML = `
        <div class="error">
          <h2>Error</h2>
          <p>Data load nahi hua. Internet check karo.</p>
          <button class="refresh-btn" onclick="location.reload()">Dobara Try Karo</button>
        </div>
      `;
    });
</script>
</body>
</html>
